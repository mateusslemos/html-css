<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. <br> Passe o mouse em cima para descobrir qual sua tag.</p>
    <ul>
        <li title="Use a tag &lt;p&gt;"><ins>Parágrafo</ins></li>
        <li title="Use a tag &lt;h1&gt;"><ins>Títulos</ins></li>
        <li title="Use a tag &lt;img&gt;"><ins>Imagens</ins></li>
        <li title="Use a tag &lt;abbr&gt;"><ins>Abreviações</ins></li>
        <li title="Use a tag &lt;code&gt;"><ins>Códigos-Fonte</ins></li>
        <li title="Use a tag &lt;ol&gt;"><ins>Listas numeradas</ins></li>
        <li title="Use a tag &lt;ins&gt;"><ins>Inserido</ins></li>        
    </ul>
</body>
</html>
