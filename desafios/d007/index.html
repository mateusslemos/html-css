<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Caso não esteja vendo a imagem completa, tente ampliar o tamanho da sua janela para ter a melhor experiência.</p>
    <picture>
        <source media="(max-width: 350px)" srcset="imagens/paisagem-p.png" type="image/png">
        <source media="(max-width: 790px)" srcset="imagens/paisagem-m.png" type="image/png">
        <source media="(max-width: 1250px)" srcset="imagens/paisagem-g.png" type="image/png">
        <img src="imagens/paisagem-g.png" alt="Imagem de paisagem flexível">
    </picture>
</body>
</html>
