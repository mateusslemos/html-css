<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            min-width: 600px;
            height: 500px;
            margin: auto;
        }

        td, th {
            border: 1px solid black;
            text-align: center;
            padding: 5px;
        }

        .fundo {
            background-color: gray;
            color: white;
        }

        .left {
            text-align: left;
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <th rowspan="2" scope="colgroup" class="fundo">Área</th>
            <th rowspan="2" scope="colgroup" class="fundo">Disciplina</th>
            <th colspan="2" scope="colgroup" class="fundo">Notas</th>
            <th rowspan="2" scope="colgroup" class="fundo">Média</th>
        </tr>
        <tr>
            <th class="fundo">Nota 1</th>
            <th class="fundo">Nota 2</th>
        </tr>
        <tr>
            <th rowspan="4" scope="rowgroup">Exatas</th>
            <td class="left">Matemática</td>
            <td>9.0</td>
            <td>7.0</td>
            <td>8.0</td>
        </tr>
        <tr>
            <td class="left">Física</td>
            <td>10.0</td>
            <td>8.0</td>
            <td>9.0</td>
        </tr>
        <tr>
            <td class="left">Química</td>
            <td>3.0</td>
            <td>6.0</td>
            <td>4.5</td>
        </tr>
        <tr>
            <td class="left">Biologia</td>
            <td>7.5</td>
            <td>8.5</td>
            <td>8.0</td>
        </tr>
        <tr>
            <th colspan="4" class="fundo left">Média de Exatas</th>
            <td class="fundo">15.25</td>
        </tr>
        <tr>
            <th rowspan="2" scope="rowgroup">Humanas</th>
            <td>História</td>
            <td>9.0</td>
            <td>10.0</td>
            <td>9.5</td>
        </tr>
        <tr>
            <td>Geografia</td>
            <td>10.0</td>
            <td>10.0</td>
            <td>10.0</td>
        </tr>
        <tr>
            <th colspan="4" class="fundo left">Média de Humanas</th>
            <td class="fundo">9.75</td>
        </tr>
    </table>
</body>
</html>
