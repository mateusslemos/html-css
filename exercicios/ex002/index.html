<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linhas</h1>
    <hr>
    <p>Você pode escrever qualquer coisa, basta escrever entre os pares de &lt;p&gt; e &lt;/p&gt; <!--lt == less than/ gt == greater than-->
    </p> 
    <p>Se precisar quebrar o texto em algum lugar específico,<br> é só utilizar a tag &lt;br&gt;
    </p>
    <p>Vamos adicionar alguns símbolos especiais:
       &reg;
       &copy;
       &trade;
       &euro;
       &pound;
       &yen;
       &cent; 
    </p>
    <p>Vamos adicionar alguns emojis:
        &#x1F596;
        &#x1F913;
    </p>
</body>
</html>
