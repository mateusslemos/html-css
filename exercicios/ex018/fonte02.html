<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Captain';
            src: url('fonts/American Captain.otf') format('opentype'), url('fonts/American Captain.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        /* 
            Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg
        */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Captain', Times, serif;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nam amet facilis fuga accusantium placeat nesciunt voluptates sed adipisci, quam, at illo nemo sit distinctio impedit ex quia quisquam. Suscipit, cum!</p>
</body>
</html>
