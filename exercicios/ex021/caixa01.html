<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        h1 { /* box-level */
            background-color: rgb(204, 204, 204);
            height: 300px;
            width: 300px;

            border: 10px solid green;

            padding: 10px;

            margin: 10px auto 50px auto;

            outline: 10px dashed blue;
        }
        a { /* inline-level */
            border: 4px solid red;

            padding: 10px;

            margin: 10px;

            outline: 3px dashed rgb(255, 187, 0);
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de caixas box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
