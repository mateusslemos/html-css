<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Responsivas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 900px;
        }

        td, th {
            border: 1px solid black;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: lightgrey;
        }

        #container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Tabelas em telas pequenas</h1>
    <div id="container">
        <table>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Sexo</th>
                <th scope="col">Idade</th>
                <th scope="col">Profissão</th>
            </tr>
            <tr>
                <td>Ana</td>
                <td>F</td>
                <td>25</td>
                <td>Jornalista</td>
            </tr>
            <tr>
                <td>João</td>
                <td>M</td>
                <td>30</td>
                <td>Advogado</td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>F</td>
                <td>55</td>
                <td>Enfermeira</td>
            </tr>
            <tr>
                <td>Cleber</td>
                <td>M</td>
                <td>89</td>
                <td>Aposentado</td>
            </tr>
            <tr>
                <td>Helena</td>
                <td>F</td>
                <td>36</td>
                <td>Bibliotecária</td>
            </tr>
            <tr>
                <td>Enzo</td>
                <td>M</td>
                <td>23</td>
                <td>Empresário</td>
            </tr>
        </table>
    </div>
</body>
</html>
