<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframe</title>
    <style>
        iframe {
            height: 400px;
            width: 400px;
        }
    </style>
</head>
<body>
    <h1>Testando um iframe</h1>
    <p>Acessando o site do
        <!-- Tamanho padrão: 300x150px -->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>
    </p>
    <p>
        Projeto Cordel
        <iframe src="https://mateusslemos.github.io/html-css/desafios/d012/cordel.html" frameborder="0" width="400">
            <a href="https://mateusslemos.github.io/html-css/desafios/d012/cordel.html" target="_blank">Projeto Cordel</a>
        </iframe>
    </p>
</body>
</html>
