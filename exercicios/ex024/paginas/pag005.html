<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    <a href="#" onclick="Clicou()">Clique aqui</a>
    <div id="saida"></div>

    <script>
        function Clicou() {
            s = document.getElementById("saida")
            s.innerHTML += '<p>Você clicou!<p>'
        }
    </script>
</body>
</html>
